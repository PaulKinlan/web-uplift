# Project-scoped Codex config. Loaded only once you've marked this project
# as trusted in Codex (it ignores .codex/ layers in untrusted repos).
#
# The agent drives the browser through the repo's own evidence primitives
# (node evidence/cli.mjs ..., raw CDP), not a browser-automation MCP server, so
# only the web-uplift skills server is registered here.

[mcp_servers.web-uplift]
command = "node"
args = ["mcp/skills-server.mjs"]
