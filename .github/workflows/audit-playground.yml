name: evidence-smoke

# The audit is fully agentic: the MODEL gathers evidence and judges the
# principles (see .claude/skills/web-audit/SKILL.md). There is no deterministic
# check runner to exercise in CI. What CI CAN verify without a model in the loop
# is that the generic evidence primitives still launch Chrome over raw CDP and
# return data/artifacts against the bundled playground. That is the smoke test
# below. The real agentic report lives in examples/playground-report.md, refreshed
# by running the agent (a person or a scheduled agent run), not by CI.

on:
  push:
    branches: [master]
    paths:
      - 'evidence/**'
      - 'playground/**'
      - 'principles/**'
      - 'schema/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/audit-playground.yml'
  workflow_dispatch:

jobs:
  evidence-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      # GitHub-hosted ubuntu runners ship google-chrome-stable. Confirm and
      # expose its path so the evidence primitives' CDP launcher can find it.
      - name: Locate Chrome
        id: chrome
        run: |
          if [ -x /usr/bin/google-chrome-stable ]; then
            echo "CHROME_BIN=/usr/bin/google-chrome-stable" >> "$GITHUB_ENV"
          elif command -v google-chrome >/dev/null 2>&1; then
            echo "CHROME_BIN=$(command -v google-chrome)" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser
            echo "CHROME_BIN=$(command -v google-chrome-stable || command -v chromium-browser)" >> "$GITHUB_ENV"
          fi
          "$CHROME_BIN" --version || true

      - name: Serve the playground
        run: |
          npx -y serve playground -l 8080 &
          echo "SERVE_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:8080/; then break; fi
            sleep 1
          done
          curl -fsS -o /dev/null -w "serve=%{http_code}\n" http://localhost:8080/

      - name: Evidence primitive smoke tests
        run: |
          set -e
          mkdir -p scratch/ci
          # DOM + computed styles under emulated dark preference.
          node evidence/cli.mjs dom "http://localhost:8080/#no-dark-mode" \
            --selector ".ndm-card" --emulate-media prefers-color-scheme=dark \
            --out scratch/ci/dom.json --wait 800 --quiet
          # Layout metrics + overflow at an emulated mobile viewport.
          node evidence/cli.mjs layout "http://localhost:8080/#fixed-layout" \
            --viewport 360x800 --out scratch/ci/layout.json --wait 800 --quiet
          # Screenshot artifact.
          node evidence/cli.mjs screenshot "http://localhost:8080/#no-dark-mode" \
            --emulate-media prefers-color-scheme=dark --out scratch/ci/shot.png --wait 800 --quiet
          # Ad-hoc in-page probe (the model's escape hatch).
          node evidence/cli.mjs evaluate "http://localhost:8080/#motion" \
            --emulate-media prefers-reduced-motion=reduce \
            --expr "document.querySelector('.mv-card').getAnimations().length" --wait 600 --quiet
          # Assert artifacts exist and have content.
          test -s scratch/ci/dom.json
          test -s scratch/ci/layout.json
          test -s scratch/ci/shot.png
          echo "evidence primitives OK"

      - name: Stop the playground server
        if: always()
        run: kill "$SERVE_PID" 2>/dev/null || true
